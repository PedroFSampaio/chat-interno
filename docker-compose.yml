version: '3.8'

services:
  chat-interno:
    build: .
    container_name: chat-interno
    restart: unless-stopped
    networks:
      lan:
        ipv4_address: 172.20.0.15
    volumes:
      - chat-data:/app/data
      - chat-uploads:/app/uploads
    environment:
      - PORT=3000
      - SESSION_SECRET=your_secret_key
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - DB_PATH=/app/data/chat.db
      - SESSIONS_DB_PATH=/app/data/sessions.db

networks:
  lan:
    external: true

volumes:
  chat-data:
  chat-uploads: